<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global IT Solutions</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser to the
      // new url with only a query string and hash fragment,
      // e.g.: https://www.foo.com/one/two?a=b&c=d#qwe, becomes
      // https://www.foo.com/?/one/two&a=b~and~c=d#qwe
      // Note: this 404.html file must be at least 512 bytes for it to work
      // with Internet Explorer (it is currently > 512 bytes)

      // For custom domains (globalitsolutions.in), set pathSegmentsToKeep to 0
      // For Project Pages with base path (e.g., /nvns/), set to 1
      // Detect if using custom domain
      var isCustomDomain = window.location.hostname === 'globalitsolutions.in' || 
                          window.location.hostname === 'www.globalitsolutions.in';
      var pathSegmentsToKeep = isCustomDomain ? 0 : 1; // 0 for custom domain, 1 for project pages

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
